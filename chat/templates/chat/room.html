{% extends 'base.html' %}
{% block title %}{{ room }}{% endblock %}
{% block content %}
<h2>{{ room }}</h2>
<div id="chat-log" style="border:1px solid #ccc; height:400px; overflow-y:auto; padding:10px; margin-bottom:10px;">
{% for message in messages %}
    <div style="margin-bottom:8px;">
        <strong>{{ message.sender.username }}</strong>
        <span style="color:gray; font-size:12px;">{{ message.timestamp|time:"H:i" }}</span><br>
        {{ message.content }}
    </div>
{% endfor %}
</div>
<input id="chat-message-input" type="text" placeholder="Type a message..." style="width:80%;">
<button id="chat-message-submit" class="btn-full" style="width:auto; padding:8px 16px;">Send</button>

<script>
const roomId = {{ room.id }};
const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
const chatSocket = new WebSocket(protocol + window.location.host + '/ws/chat/' + roomId + '/');

const chatLog = document.getElementById('chat-log');

chatSocket.onmessage = function(e) {
    const data = JSON.parse(e.data);
    const div = document.createElement('div');
    div.style.marginBottom = '8px';
    div.innerHTML = '<strong>' + data.sender + '</strong> <span style="color:gray; font-size:12px;">' + data.timestamp + '</span><br>' + data.message;
    chatLog.appendChild(div);
    chatLog.scrollTop = chatLog.scrollHeight;
};

chatSocket.onclose = function(e) {
    console.log('Chat socket closed unexpectedly');
};

document.getElementById('chat-message-input').focus();
document.getElementById('chat-message-input').onkeyup = function(e) {
    if (e.key === 'Enter') {
        document.getElementById('chat-message-submit').click();
    }
};

document.getElementById('chat-message-submit').onclick = function() {
    const messageInputDom = document.getElementById('chat-message-input');
    const message = messageInputDom.value.trim();
    if (message) {
        chatSocket.send(JSON.stringify({ 'message': message }));
        messageInputDom.value = '';
    }
};

chatLog.scrollTop = chatLog.scrollHeight;
</script>
{% endblock %}
