{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-container">
<h2>Welcome back</h2>
{% if error %}
    <p style="color:var(--danger); font-size:14px;">{{ error }}</p>
{% endif %}
<form method="post">
    {% csrf_token %}
    <label>Username</label>
    <input type="text" name="username" required>
    <label>Password</label>
    <input type="password" name="password" required>
    <button type="submit" class="btn-full">Login</button>
</form>
<p style="text-align:center; color:var(--text-muted); font-size:14px;">
    <a href="{% url 'password_reset' %}">Forgot password?</a>
</p>
<p style="text-align:center; color:var(--text-muted); font-size:14px;">Don't have an account? <a href="{% url 'register' %}">Register</a></p>
</div>
{% endblock %}
