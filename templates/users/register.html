{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-container">
<h2>Create your account</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-full">Register</button>
</form>
<p style="text-align:center; color:var(--text-muted); font-size:14px;">Already have an account? <a href="{% url 'login' %}">Login</a></p>
</div>
{% endblock %}
