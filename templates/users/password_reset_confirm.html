{% extends 'base.html' %}
{% block title %}Set New Password{% endblock %}
{% block content %}
<div class="auth-container">
<h2>Set a new password</h2>
{% if validlink %}
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-full">Reset Password</button>
</form>
{% else %}
<p style="color:var(--danger);">This reset link is invalid or has expired.</p>
{% endif %}
</div>
{% endblock %}
