{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="auth-container">
<h2>Reset your password</h2>
<p style="color:var(--text-muted); font-size:14px;">Enter your email and we'll send you a link to reset your password.</p>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-full">Send Reset Link</button>
</form>
</div>
{% endblock %}
